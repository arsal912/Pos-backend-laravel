[program:pos-queue]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/pos-backend/artisan queue:work database --sleep=3 --tries=3 --backoff=30 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=deploy
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/supervisor/pos-queue.out.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stopwaitsecs=3600
